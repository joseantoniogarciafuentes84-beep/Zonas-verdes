function showScreen(id){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});document.getElementById(id).classList.add("active");}
function goHome(){showScreen("s-home");renderHome();}

function renderHome(){
  document.getElementById("stat-n").textContent=zonas.length;
  var list=document.getElementById("zona-list");
  if(!zonas.length){list.innerHTML='<div class="empty">No hay zonas diagnosticadas aun.<br>Toca "+ Nueva zona" para empezar.</div>';return;}
  var html="";
  var recent=zonas.slice().reverse().slice(0,8);
  recent.forEach(function(z,i){
    var idx=zonas.length-1-i;
    html+='<div class="zrow" data-idx="'+idx+'"><div class="zdot"></div><div class="zinfo"><div class="zname">'+(z.zona_nom||"Sin nombre")+(z.zona_num?' <span style="font-family:DM Mono,monospace;font-size:11px;color:#7a9484">N'+z.zona_num+'</span>':'')+'</div><div class="zmeta">'+(z.zona_barrio||"—")+' - '+new Date(z.fecha).toLocaleDateString("es-ES")+'</div></div><span class="zchev">></span></div>';
  });
  list.innerHTML=html;
  list.querySelectorAll(".zrow").forEach(function(row){row.addEventListener("click",function(){fd=Object.assign({},zonas[parseInt(this.dataset.idx)]);showScreen("s-sum");renderSummary();callAI();});});
}
function renderStep(){
  var s=STEPS[step];
  document.getElementById("f-title").textContent=s.title;
  document.getElementById("f-sub").textContent=s.sub+" - Paso "+(step+1)+" de "+STEPS.length;
  document.getElementById("f-badge").textContent=(step+1)+"/"+STEPS.length;
  document.getElementById("pfill").style.width=(((step+1)/STEPS.length)*100)+"%";
  var content=document.getElementById("f-content");
  var builders={zona:buildZona,sup:buildSup,limp:buildLimp,riego:buildRiego,veg:buildVeg,arb:buildArb,mob:buildMob,serv:buildServ};
  content.innerHTML=builders[s.id]();
  content.scrollTop=0;
  bindStep(s.id);
  var nav=document.getElementById("f-nav");
  nav.innerHTML="";
  if(step>0){var bb=document.createElement("button");bb.className="bbtn";bb.textContent="Atras";bb.onclick=function(){step--;renderStep();};nav.appendChild(bb);}
  var nb=document.createElement("button");nb.className="gbtn";var isLast=step===STEPS.length-1;nb.textContent=isLast?"Generar diagnostico":"Siguiente";nb.onclick=isLast?finish:function(){step++;renderStep();};nav.appendChild(nb);
}
function buildPickerHTML(q){
  q=q.toLowerCase().trim();var h="";
  ZONAS.forEach(function(g){
    var zf=g.z.filter(function(z){return !q||z.nom.toLowerCase().indexOf(q)>-1||String(z.n).indexOf(q)>-1||g.b.toLowerCase().indexOf(q)>-1;});
    if(!zf.length)return;
    h+='<div class="pglabel">'+g.b+"</div>";
    zf.forEach(function(z){h+='<div class="pitem'+(fd.zona_num===z.n?" on":"")+'" data-n="'+z.n+'" data-nom="'+z.nom+'" data-b="'+g.b+'" data-sup="'+z.sup+'"><span class="pnum">'+z.n+'</span><span class="pname">'+z.nom+'</span><span class="psup">'+(z.sup?z.sup.toLocaleString("es-ES")+" m2":"")+"</span></div>";});
  });
  return h||'<div style="padding:16px;text-align:center;font-size:13px;color:#7a9484">Sin resultados.</div>';
}
function buildZona(){
  var h="";

    h+='<div class="zpill"><div class="zpinfo"><span class="zpbadge">N '+( fd.zona_num||"-")+'</span><div class="zpnom">'+fd.zona_nom+'</div><div class="zpbarrio">'+(fd.zona_barrio||"")+'</div>'+(fd.zona_sup?'<div class="zpsup">'+Number(fd.zona_sup).toLocaleString("es-ES")+" m2</div>":"")+'</div><button class="zpclear" id="btn-clear-zona">X</button></div>';

}
function bindStep(id){
  if(id==="zona"){
    var cb=document.getElementById("btn-clear-zona");if(cb)cb.onclick=function(){fd.zona_num=null;fd.zona_nom=null;fd.zona_barrio=null;fd.zona_sup=null;renderStep();};
    var chb=document.getElementById("btn-change-zona");if(chb)chb.onclick=function(){fd.zona_num=null;fd.zona_nom=null;fd.zona_barrio=null;fd.zona_sup=null;renderStep();};
    var oz=document.getElementById("f-obs-zona");if(oz)oz.oninput=function(){fd.obs_zona=this.value;};
    var si=document.getElementById("zona-q");
    if(si)si.oninput=function(){var p=document.getElementById("zona-picker");if(p){p.innerHTML=buildPickerHTML(this.value);bindPickerItems();}};
    bindPickerItems();
  }
  document.querySelectorAll(".scbtn").forEach(function(btn){
    btn.onclick=function(){var k=this.dataset.key,v=parseInt(this.dataset.val);fd[k]=v;document.querySelectorAll('.scbtn[data-key="'+k+'"]').forEach(function(b){b.classList.remove("on");});this.classList.add("on");};
    if(fd[btn.dataset.key]==btn.dataset.val)btn.classList.add("on");
  });
  document.querySelectorAll(".ynbtn").forEach(function(btn){
    btn.onclick=function(){var k=this.dataset.key,v=this.dataset.val;fd[k]=v;document.querySelectorAll('.ynbtn[data-key="'+k+'"]').forEach(function(b){b.classList.remove("ys","ns");});this.classList.add(v==="si"?"ys":"ns");};
    var v=fd[btn.dataset.key];if(v==="si"&&btn.dataset.val==="si")btn.classList.add("ys");if(v==="no"&&btn.dataset.val==="no")btn.classList.add("ns");
  });
  document.querySelectorAll(".chip").forEach(function(chip){
    chip.onclick=function(){var k=this.dataset.key,v=this.dataset.val,multi=this.dataset.multi==="1";if(multi){if(!Array.isArray(fd[k]))fd[k]=[];var idx=fd[k].indexOf(v);if(idx>-1){fd[k].splice(idx,1);this.classList.remove("on");}else{fd[k].push(v);this.classList.add("on");}}else{document.querySelectorAll('.chip[data-key="'+k+'"]').forEach(function(c){c.classList.remove("on");});fd[k]=v;this.classList.add("on");}};
    var k=chip.dataset.key,v=chip.dataset.val;if(Array.isArray(fd[k])&&fd[k].indexOf(v)>-1)chip.classList.add("on");if(!Array.isArray(fd[k])&&fd[k]===v)chip.classList.add("on");
  });
  document.querySelectorAll(".finput[data-key],.ftxtinp[data-key]").forEach(function(inp){inp.value=fd[inp.dataset.key]||"";inp.oninput=function(){fd[this.dataset.key]=this.value;};});
  document.querySelectorAll(".ftarea[data-key]").forEach(function(ta){ta.value=fd[ta.dataset.key]||"";ta.oninput=function(){fd[this.dataset.key]=this.value;};});
  document.querySelectorAll(".micbtn").forEach(function(btn){btn.onclick=function(){toggleMic(this.dataset.key);};});
  document.querySelectorAll(".photo-file").forEach(function(inp){inp.onchange=function(){addPhoto(this.dataset.key,this);};});
}
function bindPickerItems(){document.querySelectorAll("#zona-picker .pitem").forEach(function(item){item.onclick=function(){fd.zona_num=parseInt(this.dataset.n);fd.zona_nom=this.dataset.nom;fd.zona_barrio=this.dataset.b;fd.zona_sup=parseInt(this.dataset.sup)||0;fd.nombre=fd.zona_nom;renderStep();};});}

async function callAI(){

  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:900,messages:[{role:"user",content:prompt}]})});
    var data=await res.json();

    var parts=text.split("PROPUESTAS:");

    box.innerHTML='<div class="aihdr">Analisis IA</div><p>'+diag.replace(/\n/g,"<br>")+"</p>";
    fd.ai_diag=diag;fd.ai_prop=prop;
    if(prop){props.innerHTML=prop.split("\n").filter(function(l){return l.trim().indexOf("-")===0;}).map(function(l){var t=l.replace(/^-\s*/,"");var isA=t.indexOf("Alta")>-1;var isM=t.indexOf("Media")>-1;return'<div class="propitem"><span class="pbadge '+(isA?"pbalta":isM?"pbmedia":"pbbaja")+'">'+(isA?"Alta":isM?"Media":"Baja")+"</span><span>"+t.replace(/\[Prioridad\s*(Alta|Media|Baja)\]\s*/i,"")+"</span></div>";}).join("");}
  }catch(e){box.innerHTML='<div class="aihdr">Analisis IA</div><p style="color:#7a9484;font-style:italic">Sin conexion. El diagnostico se guardara con los datos capturados.</p>';}
}
